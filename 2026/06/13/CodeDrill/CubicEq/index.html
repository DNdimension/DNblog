    <div class="post-body" itemprop="articleBody"><p>尝试了二分，割线两种做法。割线+递归居然T了。<br />
宏定义传参要加括号，因为基于类似字符匹配的机制。浮点数判断大小用eps，直接比可能会寄。<br />
小数点后精度设置</p>
<figure class="highlight cpp"><figcaption><span>C++风格</span></figcaption><table><tr><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;iomanip&gt;</span></span></span><br><span class="line">...</span><br><span class="line">cout&lt;&lt;fixed&lt;&lt;<span class="built_in">setprecision</span>(n)&lt;&lt;...;</span><br></pre></td></tr></table></figure>
<p>或者</p>
<figure class="highlight c"><figcaption><span>C风格</span></figcaption><table><tr><td class="code"><pre><span class="line"><span class="type">int</span> p = n;</span><br><span class="line"><span class="type">double</span> k=...;</span><br><span class="line"><span class="built_in">printf</span>(<span class="string">&quot;%.*f&quot;</span>,p,k);</span><br></pre></td></tr></table></figure>
    </div>
